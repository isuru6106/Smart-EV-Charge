<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Charging Center</title>

<link rel="stylesheet" href="adminstyle.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="hero-bg-slider"></div>
<div class="overlay"></div>
<header class="topbar">

<div class="logo">
⚡ <span>SmartEV</span> Charge
</div>

<nav class="nav-links">

<a href="admin-dashboard.html">Dashboard</a>
<a href="manage-users.html">Users</a>
<a href="manage-centers.html">Centers</a>
<a href="admin-payments.html">Payments</a>
<a href="reports.html">Reports</a>

</nav>

</header>

<section class="hero-section">

<div class="hero-content">

<p class="mini-title">
NEW CHARGING CENTER
</p>

<h1>Add Charging Center</h1>

<p>
Register a new EV charging station into the SmartEV platform.
</p>

</div>

</section>
<div class="dashboard-container">

    <div class="glass-card">

    <h2>Add New Charging Center</h2>

    <form id="centerForm">

        <input type="text" name="center_name" placeholder="Center Name" required>

        <input type="text" name="address" placeholder="Address" required>

        <input type="text" name="city" placeholder="City" required>

        <input type="number" name="total_slots" placeholder="Total Charging Slots" required>

        <input type="number" step="0.01" name="price_per_hour" placeholder="Price Per Hour (Rs.)" required>

        <button type="submit" class="main-btn">
            Add Charging Center
        </button>

    </form>

</div>

</div>

<script>

document
.getElementById("centerForm")
.addEventListener("submit",function(e){

e.preventDefault();

const formData =
new FormData(this);

fetch("../php/add_center.php",{

method:"POST",
body:formData

})

.then(res=>res.text())

.then(data=>{

if(data.trim()=="success"){

alert("Charging Center Added Successfully");

window.location.href =
"manage-centers.html";

}
else{

alert(data);

}

});

});

</script>

</body>
</html>
