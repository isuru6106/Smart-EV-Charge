<body>

<div class="booking-form-card">

<h2>Bank Account Details</h2>

<form action="../php/save_bank_details.php" method="POST">

<input
type="text"
id="account_holder"
name="account_holder"
placeholder="Account Holder Name"
required
>

<small
id="holderError"
style="display:none;color:#ff6b6b;">
Only letters and spaces allowed
</small>

<input
type="text"
id="bank_name"
name="bank_name"
placeholder="Bank Name"
required
>

<small
id="bankError"
style="display:none;color:#ff6b6b;">
Invalid bank name
</small>

<input
type="text"
id="branch"
name="branch"
placeholder="Branch"
required
>

<small
id="branchError"
style="display:none;color:#ff6b6b;">
Invalid branch name
</small>

<input
type="text"
id="account_number"
name="account_number"
placeholder="Account Number"
required
>

<small
id="accountError"
style="display:none;color:#ff6b6b;">
Account number must be 8-20 digits
</small>

<button
id="saveBtn"
class="btn">
Save Details
</button>

</form>

</div>
<script>
const holder =
document.getElementById("account_holder");

const holderError =
document.getElementById("holderError");

holder.addEventListener("input", function(){

    const regex =
    /^[A-Za-z ]+$/;

    if(
        !regex.test(holder.value)
        &&
        holder.value !== ""
    ){
        holder.style.border =
        "2px solid red";

        holderError.style.display =
        "block";
    }
    else{
        holder.style.border =
        "";

        holderError.style.display =
        "none";
    }

});
</script>
<script>
    const bank =
document.getElementById("bank_name");

const bankError =
document.getElementById("bankError");

bank.addEventListener("input", function(){

    const regex =
    /^[A-Za-z ]+$/;

    if(

<script>
const branch =
document.getElementById("branch");

const branchError =
document.getElementById("branchError");

branch.addEventListener("input", function(){

    const regex =
    /^[A-Za-z ]+$/;

    if(
        !regex.test(branch.value)
        &&
        branch.value !== ""
    ){

        branch.style.border =
        "2px solid red";

        branchError.style.display =
        "block";

    }
    else{

        branch.style.border = "";

        branchError.style.display =
        "none";

    }

});
</script>
<script>
const account =
document.getElementById("account_number");

const accountError =
document.getElementById("accountError");

account.addEventListener("input", function(){

    const regex =
    /^[0-9]{8,20}$/;

    if(
        !regex.test(account.value)
        &&
        account.value !== ""
    ){

        account.style.border =
        "2px solid red";

        accountError.style.display =
        "block";

    }
    else{

        account.style.border = "";

        accountError.style.display =
        "none";

    }

});
</script>

document

    const accountRegex =

    if(

    ){

        );

</script>
