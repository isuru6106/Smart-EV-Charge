</p>

</section>

<section
id="notificationContainer"
class="notification-grid">

<!-- Notifications loaded here -->

</section>

</main>

<script>

/* LOAD NOTIFICATIONS */

function loadNotifications(){

fetch('../php/get_notifications.php')

.then(response => response.json())

.then(data => {

    let container =
    document.getElementById(
    "notificationContainer"
    );

    container.innerHTML = "";

    if(data.length === 0){

        container.innerHTML = `

        <div class="notification-card">

            <div>

                <h3>
                    No Notifications
                </h3>

                <p>
                    You don't have any notifications yet.
                </p>

            </div>

        </div>

        `;

        return;
    }

    data.forEach(item => {

        let cardClass = "info";

        if(
            item.title.includes("Approved")
        ){
            cardClass = "success";
        }

        if(
            item.title.includes("Payment")
        ){
            cardClass = "success";
        }

        if(
            item.title.includes("Battery")
        ){
            cardClass = "warning";
        }

        container.innerHTML += `

        <div class="notification-card ${cardClass}">

            <div>

                <h3>
                    ${item.title}
                </h3>

                <p>
                    ${item.message}
                </p>

                <span>
                    ${item.created_at}
                </span>

            </div>

        </div>

        `;

    });

});

}


/* LOAD UNREAD COUNT */

function loadNotificationCount(){

fetch('../php/get_notification_count.php')

.then(response => response.json())

.then(data => {

    document.getElementById(
    "notificationCount"
    ).innerHTML =

    "(" + data.unread + ")";

});

}


/* MARK AS READ */

fetch('../php/read_notifications.php');


/* INITIAL LOAD */

loadNotifications();

loadNotificationCount();


/* AUTO REFRESH EVERY 10 SECONDS */

setInterval(function(){

    loadNotifications();
    loadNotificationCount();

},10000);

</script>
