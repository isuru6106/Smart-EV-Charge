<body>

<div class="dashboard-bg"></div>
<div class="dashboard-overlay"></div>

<div class="auth-card"
style="
max-width:700px;
margin:80px auto;
">

<h1>
Card Payment
</h1>

<p>
Complete your charging payment securely
</p>

<form action="../php/topup_wallet.php" method="POST">

<input
type="hidden"
name="amount"
id="amount">

<div id="amountBox"
style="
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#00ff9d;
">
Amount : Rs. 0.00
</div>

<input
type="text"
name="cardholder_name"
placeholder="Card Holder Name"
required>

<input
type="hidden"
name="method"
value="Card"
>

<input
type="text"
name="card_number"
placeholder="Card Number"
maxlength="16"
required>

<input
type="text"
name="expiry"
placeholder="MM/YY"
maxlength="5"
required>

<input
type="password"
name="cvv"
placeholder="CVV"
maxlength="3"
required>

<button
class="btn"
type="submit">

Pay Now

</button>

</form>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const amount =
params.get("amount");

document.getElementById("amount").value =
amount;

document.getElementById("amountBox").innerHTML =
"Amount : Rs. " + parseFloat(amount).toFixed(2);

</script>

</body>
